name: Daily EDGAR Ingestion

on:
  schedule:
    # Run Tue-Sat at 2:00 AM Eastern (6:00 AM UTC), after SEC posts daily indices
    - cron: '0 6 * * 2-6'
  workflow_dispatch: # Allows you to manually trigger it via the GitHub Actions UI button

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Setup Bruin
        uses: bruin-data/setup-bruin@main
          
      - name: Install Pipeline Dependencies
        working-directory: ./data-pipeline
        run: |
          pip install -r requirements.txt
          
      - name: Run Daily EDGAR Ingestion Pipeline
        working-directory: ./data-pipeline
        env:
          # Pulls securely from GitHub Actions Secrets
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          # Run the full Bruin pipeline
          bruin run .
