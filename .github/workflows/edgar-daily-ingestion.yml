name: Daily EDGAR Ingestion

on:
  schedule:
    # Run daily at 11:00 PM UTC (7:00 PM Eastern), an optimal time after the SEC posts daily indices
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows you to manually trigger it via the GitHub Actions UI button

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Pipeline Dependencies
        run: |
          pip install requests pandas duckdb
          
      - name: Run Daily EDGAR Ingestion and Clean
        working-directory: ./data-pipeline
        env:
          # Pulls securely from GitHub Actions Secrets
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          # When run without BRUIN_START_DATE, the scripts naturally default to the current day.
          echo "Starting Data Ingestion..."
          python assets/edgar_daily_ingestion.py
          
          echo "Starting Data Cleaning..."
          python assets/clean_edgar_data.py
          
          echo "Rebuilding MotherDuck Materializations..."
          python update_view.py
